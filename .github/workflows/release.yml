name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    version:
        name: Determine version
        runs-on: ubuntu-latest
        outputs:
            should_release: ${{ steps.version.outputs.should_release }}
            version: ${{ steps.version.outputs.version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Dry-run semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: pnpm exec semantic-release --dry-run

            - name: Export next version
              id: version
              shell: bash
              run: |
                  if [ -f .next-version ]; then
                    echo "should_release=true" >> "$GITHUB_OUTPUT"
                    echo "version=$(tr -d '[:space:]' < .next-version)" >> "$GITHUB_OUTPUT"
                  else
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                  fi

    build:
        name: Build ${{ matrix.os }}
        needs: version
        if: needs.version.outputs.should_release == 'true'
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [windows-latest, macos-latest]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Set package version
              env:
                  VERSION: ${{ needs.version.outputs.version }}
              shell: bash
              run: |
                  node -e "
                    const fs = require('node:fs');
                    const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                    pkg.version = process.env.VERSION;
                    fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
                  "

            - name: Build Windows
              if: runner.os == 'Windows'
              run: pnpm build:win

            - name: Build macOS
              if: runner.os == 'macOS'
              run: pnpm build:mac

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ runner.os }}
                  path: |
                      dist/*.exe
                      dist/*.dmg
                      dist/*.zip
                      dist/*.blockmap
                  if-no-files-found: error

    release:
        name: Publish GitHub Release
        needs: [version, build]
        if: needs.version.outputs.should_release == 'true'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-artifacts
                  merge-multiple: true

            - name: Publish release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: pnpm exec semantic-release

            - name: Upload release assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.version.outputs.version }}
              shell: bash
              run: |
                  shopt -s nullglob
                  assets=(release-artifacts/*)
                  if [ ${#assets[@]} -eq 0 ]; then
                    echo "No release artifacts found"
                    exit 1
                  fi
                  gh release upload "v${VERSION}" "${assets[@]}" --clobber
